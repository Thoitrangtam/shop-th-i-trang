<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Shop Thời Trang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      letter-spacing: 2px;
    }

    .banner {
      width: 100%;
      height: 250px;
      background: url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd47') center/cover;
    }

    .container {
      padding: 20px;
    }

    .title {
      font-size: 20px;
      margin-bottom: 15px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .name {
      font-weight: bold;
      margin: 8px 0;
    }

    .price {
      color: red;
      font-size: 16px;
    }

    .btn {
      display: block;
      text-align: center;
      margin-top: 10px;
      padding: 8px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .btn:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: black;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>THỜI TRANG NỮ 1510</header>

<div class="banner"></div>

<div class="container">
  <div class="title">🔥 Sản phẩm nổi bật</div>

  <div class="products">

    <!-- Sản phẩm 1 -->
    <div class="card">
      <img src="Set_cho_ngi_mu_ab486a6283.jpeg">
      <div class="name">Set đồ nữ cao cấp</div>
      <div class="price">299.000đ</div>
      <a class="btn" href="https://s.shopee.vn/8fNE7KHPaL" target="_blank">Mua ngay</a>
    </div>

    <!-- Sản phẩm 2 -->
    <div class="card">
      <img src="https://down-vn.img.susercontent.com/file/359247754bc4b369f1e2c0aad09a1ddb.webp">
      <div class="name">Quần tây form đẹp</div>
      <div class="price">199.000đ</div>
      <a class="btn" href="https://s.shopee.vn/AUosHKiySI" target="_blank">Mua ngay</a>
    </div>

  </div>
</div>

<footer>
  © 2026 Thoitrangnu1510 - Uy tín tạo nên thương hiệu
</footer>

</body>
</html>
