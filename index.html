<!DOCTYPE html>
<html>
<head>
    <title>Shop Thời Trang</title>
    <style>
        body {
            font-family: Arial;
            background: #f8f8f8;
            margin: 0;
        }

        .header {
            background: #ff4d6d;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .product:hover {
            transform: scale(1.05);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .price {
            color: #ff4d6d;
            font-weight: bold;
        }

        button {
            background: #ff4d6d;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e6004c;
        }
    </style>
</head>
<body>

    <div class="header">
        SHOP THỜI TRANG NỮ HOT TREND 🔥
    </div>

    <div class="container">

        <div class="product">
            <img src="https://down-vn.img.susercontent.com/file/vn-11134207-7r98o-m013j9j96u1t7f.webp">
            <h3>Váy trắng tiểu thư</h3>
            <p class="price">99.900-104.000đ</p>
            <a href="https://s.shopee.vn/Li6C6xuZa" target="_blank">
                <button>Mua ngay</button>
            </a>
        </div>

        <div class="product">
            <img src="https://down-vn.img.susercontent.com/file/vn-11134207-7qukw-ljf04ata95ua6b.webp">
            <h3>Đầm body quyến rũ</h3>
            <p class="price">119.595đ</p>
            <a href="https://s.shopee.vn/8fNE7KHPaL" target="_blank">
                <button>Mua ngay</button>
            </a>
        </div>

        <div class="product">
            <img src="https://down-vn.img.susercontent.com/file/vn-11134207-7qukw-lhw9awzc4ywxa9.webp">
            <h3>Set công sở thanh lịch</h3>
            <p class="price">89.900đ</p>
            <a href="https://s.shopee.vn/AUosHKiySI" target="_blank">
                <button>Mua ngay</button>
            </a>
        </div>

    </div>

</body>
</html>
